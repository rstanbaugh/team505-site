<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSM</title>
  <meta name="description" content="RS Managment contact information and company overview.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Sora:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260324c">
</head>
<body>
  <div class="site-bg" aria-hidden="true"></div>

  <header class="nav-wrap">
    <nav class="nav" aria-label="Main">
      <a class="nav-home" href="#home">Home</a>
      <div class="nav-dropdown">
        <button class="nav-about" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="about-menu">
          About
        </button>
        <div class="nav-dropdown-menu" id="about-menu" role="menu" aria-label="About menu">
          <a class="nav-dropdown-item" role="menuitem" href="/about/">About</a>
          <a class="nav-dropdown-item" role="menuitem" href="/privacy/">Privacy</a>
          <a class="nav-dropdown-item" role="menuitem" href="/terms/">Terms</a>
        </div>
      </div>
    </nav>
  </header>

  <main>
    <section id="home" class="hero">
      <img src="assets/rsm-logo-1.png" alt="RSM logo" class="hero-logo">
      <p class="subtitle">Intelligent Solutions</p>
    </section>

  </main>

  <footer class="footer">
    <small>© <span id="year"></span> RSM. All rights reserved.</small>
    <div class="footer-links"><a href="/privacy/">privacy</a> &middot; <a href="/terms/">terms</a></div>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const dropdown = document.querySelector(".nav-dropdown");
    const toggle = dropdown.querySelector(".nav-about");

    toggle.addEventListener("click", () => {
      const isOpen = dropdown.classList.toggle("open");
      toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
    });

    document.addEventListener("click", (event) => {
      if (!dropdown.contains(event.target)) {
        dropdown.classList.remove("open");
        toggle.setAttribute("aria-expanded", "false");
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        dropdown.classList.remove("open");
        toggle.setAttribute("aria-expanded", "false");
      }
    });
  </script>
</body>
</html>
